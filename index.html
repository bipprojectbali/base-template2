<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="Full-stack starter template — Bun, Elysia, React, Prisma, Redis" />
    <base href="/" />
    <link rel="icon" type="image/svg+xml" href="/src/logo.svg" />
    <title>BunStack</title>
    <script>
      // Resolve color scheme before first paint to prevent flash
      (function() {
        var stored = localStorage.getItem('mantine-color-scheme-value');
        var scheme = stored || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-mantine-color-scheme', scheme);
        document.documentElement.style.colorScheme = scheme;
        window.__colorScheme = scheme;
      })();
    </script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
      }
      html[data-mantine-color-scheme="dark"],
      html[data-mantine-color-scheme="dark"] body {
        background-color: #141414;
        color: #c1c2c5;
      }
      html[data-mantine-color-scheme="light"],
      html[data-mantine-color-scheme="light"] body {
        background-color: #ffffff;
        color: #1a1b1e;
      }

      /* ── Splash ──────────────────────────────────────────────── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.4s ease;
      }
      html[data-mantine-color-scheme="dark"] #splash {
        background-color: #141414;
      }
      html[data-mantine-color-scheme="light"] #splash {
        background-color: #ffffff;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .splash-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        animation: splash-in 0.35s ease forwards;
      }
      @keyframes splash-in {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .splash-logo {
        width: 52px;
        height: 52px;
        border-radius: 13px;
        background: linear-gradient(135deg, #3b82f6 0%, #7c3aed 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 24px rgba(59,130,246,0.35);
      }
      .splash-logo svg {
        width: 28px;
        height: 28px;
      }

      .splash-name {
        font-family: Inter, system-ui, Avenir, Helvetica, Arial, sans-serif;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.03em;
      }
      html[data-mantine-color-scheme="dark"] .splash-name  { color: #f1f3f5; }
      html[data-mantine-color-scheme="light"] .splash-name { color: #1a1b1e; }

      /* Three-dot loader */
      .splash-dots {
        display: flex;
        gap: 6px;
      }
      .splash-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #3b82f6;
        animation: dot-bounce 1.2s ease-in-out infinite;
      }
      .splash-dots span:nth-child(2) { animation-delay: 0.18s; }
      .splash-dots span:nth-child(3) { animation-delay: 0.36s; }
      @keyframes dot-bounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
        40%            { transform: scale(1);   opacity: 1;   }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-inner">
        <!-- Icon -->
        <div class="splash-logo">
          <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="sb" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#ffffff"/>
                <stop offset="100%" style="stop-color:#ddd6fe"/>
              </linearGradient>
            </defs>
            <path d="M38 7 L21 33 L31 33 L26 57 L43 31 L33 31 Z" fill="url(#sb)"/>
          </svg>
        </div>
        <!-- Name -->
        <div class="splash-name">BunStack</div>
        <!-- Dots loader -->
        <div class="splash-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/frontend.tsx"></script>
  </body>
</html>
